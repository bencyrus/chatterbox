services:
  gateway:
    build:
      context: .
      dockerfile: ./gateway/Dockerfile
    container_name: gateway
    restart: unless-stopped
    env_file:
      - ./secrets/.env.gateway
    networks:
      - chattterbox-network
    depends_on:
      - postgrest
  postgres:
    build:
      context: .
      dockerfile: ./postgres/Dockerfile
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    env_file:
      - ./secrets/.env.postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/backups:/backups
    networks:
      - chattterbox-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
  postgrest:
    image: postgrest/postgrest:latest
    container_name: postgrest
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./secrets/.env.postgrest
    # NO external ports - internal only for security
    networks:
      - chattterbox-network
    depends_on:
      postgres:
        condition: service_healthy
  caddy:
    image: caddy:alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80" # HTTP (for redirect to HTTPS)
      - "443:443" # HTTPS
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    env_file:
      - ./secrets/.env.caddy
    networks:
      - chattterbox-network
    depends_on:
      - gateway
      - files
      - swaggerui
      - web
      - metabase

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    restart: unless-stopped
    env_file:
      - ./secrets/.env.alloy
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "12345:12345"
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    networks:
      - chattterbox-network

  files:
    build:
      context: .
      dockerfile: ./files/Dockerfile
    container_name: files
    restart: unless-stopped
    ports:
      - "9090:9090"
    env_file:
      - ./secrets/.env.files
    networks:
      - chattterbox-network

  worker:
    build:
      context: .
      dockerfile: ./worker/Dockerfile
    container_name: worker
    restart: unless-stopped
    env_file:
      - ./secrets/.env.worker
    networks:
      - chattterbox-network
    depends_on:
      postgrest:
        condition: service_started
      postgres:
        condition: service_healthy

  db-backup:
    build:
      context: .
      dockerfile: ./db-backup/Dockerfile
    container_name: db-backup
    restart: unless-stopped
    env_file:
      - ./secrets/.env.db-backup
    volumes:
      - ./postgres/backups:/backups
    networks:
      - chattterbox-network
    depends_on:
      postgres:
        condition: service_healthy

  swaggerui:
    image: swaggerapi/swagger-ui:latest
    container_name: swaggerui
    restart: unless-stopped
    environment:
      URL: /openapi.json
    networks:
      - chattterbox-network
    depends_on:
      - gateway

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: production
    container_name: web
    restart: unless-stopped
    ports:
      - "5173:5173"
    networks:
      - chattterbox-network

  metabase-postgres:
    image: postgres:16
    container_name: metabase-postgres
    restart: unless-stopped
    env_file:
      - ./secrets/.env.metabase-postgres
    volumes:
      - metabase_postgres_data:/var/lib/postgresql/data
    networks:
      - chattterbox-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    restart: unless-stopped
    env_file:
      - ./secrets/.env.metabase
    networks:
      - chattterbox-network
    depends_on:
      metabase-postgres:
        condition: service_healthy
    healthcheck:
      test: curl --fail -I http://localhost:3000/api/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  metabase_postgres_data:

networks:
  chattterbox-network:
    driver: bridge
